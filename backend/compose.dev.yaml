# Docker Compose для локального запуска (опционально).
# Бэкенд полностью автономен: ни БД, ни брокера — только один процесс app.
# Обучение идёт фоновой задачей, тяжёлый spaCy train уходит в дочерний процесс.

services:
  app:
    build:
      context: .
      target: production
    environment:
      NERFORGE_DATA_DIR: /app/data
      NERFORGE_CORS_ORIGINS: '["http://localhost:3000"]'
    ports:
      - '8000:8000'
    volumes:
      - ./src:/app/src
      - model_data:/app/data

volumes:
  model_data:
